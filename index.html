<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>HIS SYSTEM| SALES Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

</head>

<body>

<div class="app-container">

    <!-- Header -->

    <div class="header">

        <div class="logo-area">

            <h1><img src="">HisSystem</h1>

            <p>Sales Dashboard</p>

        </div>

        <div class="header-actions">

            <div class="date-picker-wrapper">

                <i class="fas fa-calendar-alt"></i>

                <input type="date" id="globalDatePicker">

            </div>

            <button class="icon-btn" id="undoBtn"><i class="fas fa-undo-alt"></i> Undo last</button>

            <button class="icon-btn" id="themeToggleBtn"><i class="fas fa-moon"></i> Theme</button>

            <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i> Services</button>

        </div>

    </div>



    <!-- KPI Cards -->

    <div class="kpi-grid" id="kpiContainer">

        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-wallet"></i> Today's Income</div><div class="kpi-value" id="todayIncome">₦0</div></div>

        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-receipt"></i> Expenses</div><div class="kpi-value" id="todayExpense">₦0</div></div>

        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-chart-simple"></i> Net Profit</div><div class="kpi-value" id="netProfitVal">₦0</div></div>

        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-exchange-alt"></i> Transactions</div><div class="kpi-value" id="txCount">0</div></div>

    </div>



    <!-- Charts -->

    <div class="charts-row">

        <div class="chart-card"><h3><i class="fas fa-chart-line"></i> Weekly Profit Trend</h3><canvas id="weeklyChart"></canvas></div>

        <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> Today's Sales by Service</h3><canvas id="pieChart"></canvas></div>

    </div>



    <!-- Quick Actions Split -->

    <div class="action-split">

        <div class="action-card">

            <h3><i class="fas fa-bolt"></i> Quick Sale</h3>

            <div class="quantity-zone">

                <button class="qty-btn" id="qtyMinus">-</button>

                <span id="currentQty" style="font-weight: 700; min-width: 30px; text-align: center;">1</span>

                <button class="qty-btn" id="qtyPlus">+</button>

                <span style="margin-left: 0.5rem;">x item</span>

            </div>

            <div id="dynamicServiceButtons" class="service-buttons"></div>

            <div class="form-row">

                <input type="number" id="customAmount" placeholder="₦ Custom amount">

                <input type="text" id="customDesc" placeholder="Description (e.g., CV)">

                <button class="icon-btn" id="addCustomSaleBtn" style="background: var(--primary); color:white;"><i class="fas fa-plus"></i> Add</button>

            </div>

        </div>

        <div class="action-card">

            <h3><i class="fas fa-coins"></i> Record Expense</h3>

            <div class="form-row">

                <select id="expenseTypeSelect">

                    <option>Fuel</option><option>Data</option><option>Staff</option><option>Generator</option><option>Food/Tea</option><option>Other</option>

                </select>

                <input type="number" id="expenseAmount" placeholder="Amount (₦)">

                <input type="text" id="expenseNote" placeholder="Note (optional)">

                <button class="icon-btn" id="addExpenseBtn" style="background: var(--danger); color:white;"><i class="fas fa-minus-circle"></i> Add</button>

            </div>

        </div>

    </div>



    <!-- Transaction History -->

    <div class="transactions-card">

        <div class="tabs">

            <button class="tab-btn active" data-tab="sales">📋 Sales History</button>

            <button class="tab-btn" data-tab="expenses">💸 Expense History</button>

        </div>

        <div id="salesPane" class="tab-pane active">

            <div style="overflow-x: auto;"><table id="salesTable"><thead><tr><th>Time</th><th>Item</th><th>Qty</th><th>Amount</th><th></th></tr></thead><tbody id="salesTbody"></tbody></table></div>

        </div>

        <div id="expensesPane" class="tab-pane">

            <div style="overflow-x: auto;"><table id="expensesTable"><thead><tr><th>Time</th><th>Type</th><th>Note</th><th>Amount</th><th></th></tr></thead><tbody id="expensesTbody"></tbody></table></div>

        </div>

        <div class="footer-actions">

            <div><button class="icon-btn" id="exportCsvBtn"><i class="fas fa-file-csv"></i> Export CSV</button>

            <button class="icon-btn" id="printReportBtn"><i class="fas fa-print"></i> Print</button>

            <button class="icon-btn" id="backupJsonBtn"><i class="fas fa-database"></i> Backup JSON</button>

            <input type="file" id="restoreFileInput" accept=".json" style="display:none;">

            <button class="icon-btn" id="restoreBtn"><i class="fas fa-upload"></i> Restore</button></div>

            <button class="icon-btn" id="clearAllBtn" style="background: rgba(239,68,68,0.2);"><i class="fas fa-trash-alt"></i> Reset all data</button>

        </div>

    </div>

</div>

<div id="toastMsg" class="toast"></div>



<!-- Modal for service settings -->

<div id="serviceModal" class="modal">

    <div class="modal-content">

        <h3><i class="fas fa-edit"></i> Customise Services</h3>

        <div id="servicesEditorList"></div>

        <button id="addServiceModalBtn" class="icon-btn" style="margin-top: 1rem; width:100%">+ Add new service</button>

        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">

            <button id="saveServicesBtn" class="icon-btn" style="background: var(--success);">Save</button>

            <button id="closeModalBtn" class="icon-btn">Cancel</button>

        </div>

    </div>

</div>
    <script src="script.js">

</body>

</html>
