<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CafeFlow | Intelligent Cyber Cafe Dashboard</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #f0f4fa;
            --bg-gradient-end: #e9edf2;
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-light: #e2e8f0;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            --shadow-md: 0 20px 35px -12px rgba(0,0,0,0.1);
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
            --glass-border: 1px solid rgba(255,255,255,0.4);
        }

        body.dark {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.2);
            --shadow-md: 0 20px 35px -12px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .app-container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(12px);
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1rem 2rem;
            box-shadow: var(--shadow-sm);
            border: var(--glass-border);
        }

        .logo-area h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .date-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(59,130,246,0.1);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
        }

        .date-picker-wrapper i {
            color: var(--primary);
        }

        input[type="date"] {
            background: transparent;
            border: none;
            font-family: 'Inter', monospace;
            font-weight: 500;
            color: var(--text-primary);
            padding: 0.3rem;
            border-radius: 0.5rem;
        }

        .icon-btn {
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            box-shadow: var(--shadow-sm);
            border: var(--glass-border);
            transition: all 0.25s;
        }

        .kpi-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

        .kpi-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
        .kpi-value { font-size: 2.5rem; font-weight: 700; font-family: 'Poppins'; margin-top: 0.3rem; }
        .profit-positive { color: var(--success); }
        .profit-negative { color: var(--danger); }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: var(--shadow-sm);
            border: var(--glass-border);
        }

        .chart-card h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        canvas { max-height: 250px; width: 100% !important; }

        /* Two column action area */
        .action-split {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .action-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: var(--glass-border);
        }

        .service-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .service-btn {
            background: rgba(59,130,246,0.15);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .service-btn:hover { background: var(--primary); color: white; transform: scale(0.97); }

        .quantity-zone {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0,0,0,0.05);
            padding: 0.3rem 1rem;
            border-radius: 3rem;
            width: fit-content;
            margin-bottom: 1rem;
        }

        .qty-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 0.5rem;
        }

        .form-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .form-row input, .form-row select {
            flex: 1;
            padding: 0.7rem;
            border-radius: 1rem;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
        }

        /* Tables */
        .transactions-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: var(--glass-border);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2rem 2rem 0 0;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-light);
        }

        .delete-trans {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: space-between;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            z-index: 2000;
            animation: fadeInUp 0.2s ease;
            display: none;
            font-weight: 500;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .service-item {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            align-items: center;
        }
        @media (max-width: 800px) {
            .charts-row { grid-template-columns: 1fr; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div class="header">
        <div class="logo-area">
            <h1><i class="fas fa-chart-line"></i> CafeFlow</h1>
            <p>Smart cyber cafe intelligence</p>
        </div>
        <div class="header-actions">
            <div class="date-picker-wrapper">
                <i class="fas fa-calendar-alt"></i>
                <input type="date" id="globalDatePicker">
            </div>
            <button class="icon-btn" id="undoBtn"><i class="fas fa-undo-alt"></i> Undo last</button>
            <button class="icon-btn" id="themeToggleBtn"><i class="fas fa-moon"></i> Theme</button>
            <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i> Services</button>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpiContainer">
        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-wallet"></i> Today's Income</div><div class="kpi-value" id="todayIncome">₦0</div></div>
        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-receipt"></i> Expenses</div><div class="kpi-value" id="todayExpense">₦0</div></div>
        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-chart-simple"></i> Net Profit</div><div class="kpi-value" id="netProfitVal">₦0</div></div>
        <div class="kpi-card"><div class="kpi-title"><i class="fas fa-exchange-alt"></i> Transactions</div><div class="kpi-value" id="txCount">0</div></div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
        <div class="chart-card"><h3><i class="fas fa-chart-line"></i> Weekly Profit Trend</h3><canvas id="weeklyChart"></canvas></div>
        <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> Today's Sales by Service</h3><canvas id="pieChart"></canvas></div>
    </div>

    <!-- Quick Actions Split -->
    <div class="action-split">
        <div class="action-card">
            <h3><i class="fas fa-bolt"></i> Quick Sale</h3>
            <div class="quantity-zone">
                <button class="qty-btn" id="qtyMinus">-</button>
                <span id="currentQty" style="font-weight: 700; min-width: 30px; text-align: center;">1</span>
                <button class="qty-btn" id="qtyPlus">+</button>
                <span style="margin-left: 0.5rem;">x item</span>
            </div>
            <div id="dynamicServiceButtons" class="service-buttons"></div>
            <div class="form-row">
                <input type="number" id="customAmount" placeholder="₦ Custom amount">
                <input type="text" id="customDesc" placeholder="Description (e.g., CV)">
                <button class="icon-btn" id="addCustomSaleBtn" style="background: var(--primary); color:white;"><i class="fas fa-plus"></i> Add</button>
            </div>
        </div>
        <div class="action-card">
            <h3><i class="fas fa-coins"></i> Record Expense</h3>
            <div class="form-row">
                <select id="expenseTypeSelect">
                    <option>Fuel</option><option>Data</option><option>Staff</option><option>Generator</option><option>Food/Tea</option><option>Other</option>
                </select>
                <input type="number" id="expenseAmount" placeholder="Amount (₦)">
                <input type="text" id="expenseNote" placeholder="Note (optional)">
                <button class="icon-btn" id="addExpenseBtn" style="background: var(--danger); color:white;"><i class="fas fa-minus-circle"></i> Add</button>
            </div>
        </div>
    </div>

    <!-- Transaction History -->
    <div class="transactions-card">
        <div class="tabs">
            <button class="tab-btn active" data-tab="sales">📋 Sales History</button>
            <button class="tab-btn" data-tab="expenses">💸 Expense History</button>
        </div>
        <div id="salesPane" class="tab-pane active">
            <div style="overflow-x: auto;"><table id="salesTable"><thead><tr><th>Time</th><th>Item</th><th>Qty</th><th>Amount</th><th></th></tr></thead><tbody id="salesTbody"></tbody></table></div>
        </div>
        <div id="expensesPane" class="tab-pane">
            <div style="overflow-x: auto;"><table id="expensesTable"><thead><tr><th>Time</th><th>Type</th><th>Note</th><th>Amount</th><th></th></tr></thead><tbody id="expensesTbody"></tbody></table></div>
        </div>
        <div class="footer-actions">
            <div><button class="icon-btn" id="exportCsvBtn"><i class="fas fa-file-csv"></i> Export CSV</button>
            <button class="icon-btn" id="printReportBtn"><i class="fas fa-print"></i> Print</button>
            <button class="icon-btn" id="backupJsonBtn"><i class="fas fa-database"></i> Backup JSON</button>
            <input type="file" id="restoreFileInput" accept=".json" style="display:none;">
            <button class="icon-btn" id="restoreBtn"><i class="fas fa-upload"></i> Restore</button></div>
            <button class="icon-btn" id="clearAllBtn" style="background: rgba(239,68,68,0.2);"><i class="fas fa-trash-alt"></i> Reset all data</button>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<!-- Modal for service settings -->
<div id="serviceModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-edit"></i> Customise Services</h3>
        <div id="servicesEditorList"></div>
        <button id="addServiceModalBtn" class="icon-btn" style="margin-top: 1rem; width:100%">+ Add new service</button>
        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
            <button id="saveServicesBtn" class="icon-btn" style="background: var(--success);">Save</button>
            <button id="closeModalBtn" class="icon-btn">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ---------- DATA MODEL ----------
    let salesDB = {};      // { "2025-01-15": [ {id, time, item, quantity, amount} ] }
    let expensesDB = {};
    let dynamicServices = [   // default services - editable
        { name: "🌐 Browsing 1hr", price: 200 },
        { name: "🖨️ Print B&W", price: 50 },
        { name: "🎨 Print Color", price: 150 },
        { name: "📄 Lamination", price: 300 },
        { name: "📸 Scanning", price: 100 }
    ];

    let currentDate = new Date().toISOString().split('T')[0];
    let currentQty = 1;
    let weeklyChart, pieChart;

    // Helper: load from localStorage
    function loadAllData() {
        const savedSales = localStorage.getItem('cafeflow_sales');
        const savedExpenses = localStorage.getItem('cafeflow_expenses');
        const savedServices = localStorage.getItem('cafeflow_services');
        if(savedSales) salesDB = JSON.parse(savedSales);
        if(savedExpenses) expensesDB = JSON.parse(savedExpenses);
        if(savedServices) dynamicServices = JSON.parse(savedServices);
        if(!salesDB[currentDate]) salesDB[currentDate] = [];
        if(!expensesDB[currentDate]) expensesDB[currentDate] = [];
    }
    function persistAll() {
        localStorage.setItem('cafeflow_sales', JSON.stringify(salesDB));
        localStorage.setItem('cafeflow_expenses', JSON.stringify(expensesDB));
        localStorage.setItem('cafeflow_services', JSON.stringify(dynamicServices));
    }

    // Helpers: get totals for a given date
    function getTotals(date) {
        const sales = salesDB[date] || [];
        const expenses = expensesDB[date] || [];
        const income = sales.reduce((s, t) => s + t.amount, 0);
        const expenseSum = expenses.reduce((s, t) => s + t.amount, 0);
        return { income, expenseSum, profit: income - expenseSum, txCount: sales.length + expenses.length };
    }

    // Render KPI & tables & pie chart
    function renderCurrentDay() {
        const { income, expenseSum, profit, txCount } = getTotals(currentDate);
        document.getElementById('todayIncome').innerHTML = `₦${income.toLocaleString()}`;
        document.getElementById('todayExpense').innerHTML = `₦${expenseSum.toLocaleString()}`;
        const profitEl = document.getElementById('netProfitVal');
        profitEl.innerHTML = `₦${profit.toLocaleString()}`;
        profitEl.className = `kpi-value ${profit >=0 ? 'profit-positive' : 'profit-negative'}`;
        document.getElementById('txCount').innerHTML = txCount;

        // render sales table
        const salesList = salesDB[currentDate] || [];
        const salesTbody = document.getElementById('salesTbody');
        salesTbody.innerHTML = salesList.map(s => `
            <tr>
                <td>${s.time}</td><td>${s.item}</td><td>${s.quantity || 1}</td><td>₦${s.amount.toLocaleString()}</td>
                <td><button class="delete-trans" data-id="${s.id}" data-type="sale"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        // expenses table
        const expList = expensesDB[currentDate] || [];
        const expTbody = document.getElementById('expensesTbody');
        expTbody.innerHTML = expList.map(e => `
            <tr>
                <td>${e.time}</td><td>${e.type}</td><td>${e.notes || '-'}</td><td>₦${e.amount.toLocaleString()}</td>
                <td><button class="delete-trans" data-id="${e.id}" data-type="expense"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        attachDeleteEvents();
        updatePieChart();
    }

    function attachDeleteEvents() {
        document.querySelectorAll('.delete-trans').forEach(btn => {
            btn.removeEventListener('click', handleDelete);
            btn.addEventListener('click', handleDelete);
        });
    }
    function handleDelete(e) {
        const btn = e.currentTarget;
        const id = parseInt(btn.dataset.id);
        const type = btn.dataset.type;
        if(type === 'sale') {
            salesDB[currentDate] = (salesDB[currentDate] || []).filter(t => t.id !== id);
        } else {
            expensesDB[currentDate] = (expensesDB[currentDate] || []).filter(t => t.id !== id);
        }
        persistAll();
        renderCurrentDay();
        updateWeeklyChart();
        showToast('Deleted', '#ef4444');
    }

    function addSale(itemName, price, quantity = 1) {
        const total = price * quantity;
        const newSale = {
            id: Date.now(),
            time: new Date().toLocaleTimeString(),
            item: itemName,
            quantity: quantity,
            amount: total
        };
        if(!salesDB[currentDate]) salesDB[currentDate] = [];
        salesDB[currentDate].push(newSale);
        persistAll();
        renderCurrentDay();
        updateWeeklyChart();
        showToast(`✅ +${itemName} x${quantity} = ₦${total.toLocaleString()}`, '#10b981');
    }

    function addExpense(type, amount, notes) {
        const newExp = {
            id: Date.now(),
            time: new Date().toLocaleTimeString(),
            type: type,
            notes: notes,
            amount: amount
        };
        if(!expensesDB[currentDate]) expensesDB[currentDate] = [];
        expensesDB[currentDate].push(newExp);
        persistAll();
        renderCurrentDay();
        updateWeeklyChart();
        showToast(`➖ Expense: ${type} ₦${amount.toLocaleString()}`, '#f59e0b');
    }

    function undoLast() {
        const salesArr = salesDB[currentDate] || [];
        const expArr = expensesDB[currentDate] || [];
        const all = [...salesArr.map(s => ({...s, category:'sale'})), ...expArr.map(e => ({...e, category:'expense'}))];
        if(all.length === 0) { showToast('Nothing to undo', '#ef4444'); return; }
        all.sort((a,b) => b.id - a.id);
        const last = all[0];
        if(last.category === 'sale') {
            salesDB[currentDate] = salesArr.filter(s => s.id !== last.id);
        } else {
            expensesDB[currentDate] = expArr.filter(e => e.id !== last.id);
        }
        persistAll();
        renderCurrentDay();
        updateWeeklyChart();
        showToast('↩️ Undid last transaction', '#3b82f6');
    }

    // Weekly chart (last 7 real days, profit only)
    function getLast7DaysProfit() {
        let labels = [];
        let profits = [];
        for(let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            let dateStr = d.toISOString().split('T')[0];
            labels.push(dateStr.slice(5));
            const { profit } = getTotals(dateStr);
            profits.push(profit);
        }
        return { labels, profits };
    }

    function updateWeeklyChart() {
        const { labels, profits } = getLast7DaysProfit();
        if(weeklyChart) weeklyChart.destroy();
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        weeklyChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'Net Profit (₦)', data: profits, borderColor: '#3b82f6', tension: 0.3, fill: true, backgroundColor: 'rgba(59,130,246,0.1)' }] },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }

    function updatePieChart() {
        const salesToday = salesDB[currentDate] || [];
        const serviceMap = new Map();
        salesToday.forEach(s => { let key = s.item; serviceMap.set(key, (serviceMap.get(key) || 0) + s.amount); });
        const labels = Array.from(serviceMap.keys());
        const data = Array.from(serviceMap.values());
        if(pieChart) pieChart.destroy();
        const ctx = document.getElementById('pieChart').getContext('2d');
        pieChart = new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data, backgroundColor: ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4'] }] }, options: { responsive: true } });
    }

    function renderServiceButtons() {
        const container = document.getElementById('dynamicServiceButtons');
        container.innerHTML = '';
        dynamicServices.forEach(serv => {
            const btn = document.createElement('button');
            btn.className = 'service-btn';
            btn.innerHTML = `<i class="fas fa-tag"></i> ${serv.name} <strong>₦${serv.price.toLocaleString()}</strong>`;
            btn.onclick = () => addSale(serv.name, serv.price, currentQty);
            container.appendChild(btn);
        });
    }

    // Modal services editor
    function openServiceModal() {
        const editorDiv = document.getElementById('servicesEditorList');
        editorDiv.innerHTML = '';
        dynamicServices.forEach((serv, idx) => {
            const div = document.createElement('div');
            div.className = 'service-item';
            div.innerHTML = `
                <input type="text" value="${serv.name}" id="servName_${idx}" style="flex:2;">
                <input type="number" value="${serv.price}" id="servPrice_${idx}" style="flex:1;">
                <button class="icon-btn removeServiceBtn" data-idx="${idx}" style="background: none; color:red;"><i class="fas fa-times"></i></button>
            `;
            editorDiv.appendChild(div);
        });
        document.getElementById('serviceModal').style.display = 'flex';
        document.querySelectorAll('.removeServiceBtn').forEach(btn => {
            btn.onclick = (e) => {
                let idx = parseInt(btn.dataset.idx);
                dynamicServices.splice(idx,1);
                openServiceModal(); // refresh
            };
        });
    }

    function saveServicesFromModal() {
        let newServices = [];
        for(let i = 0; i < dynamicServices.length; i++) {
            let nameInput = document.getElementById(`servName_${i}`);
            let priceInput = document.getElementById(`servPrice_${i}`);
            if(nameInput && priceInput) {
                newServices.push({ name: nameInput.value, price: parseInt(priceInput.value) || 0 });
            }
        }
        dynamicServices = newServices;
        persistAll();
        renderServiceButtons();
        document.getElementById('serviceModal').style.display = 'none';
        showToast('Services updated', '#10b981');
    }

    function exportBackup() {
        const fullData = { salesDB, expensesDB, dynamicServices };
        const dataStr = JSON.stringify(fullData);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `cafe_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Backup saved', '#3b82f6');
    }

    function restoreBackup(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                salesDB = data.salesDB || {};
                expensesDB = data.expensesDB || {};
                dynamicServices = data.dynamicServices || dynamicServices;
                if(!salesDB[currentDate]) salesDB[currentDate] = [];
                if(!expensesDB[currentDate]) expensesDB[currentDate] = [];
                persistAll();
                renderServiceButtons();
                renderCurrentDay();
                updateWeeklyChart();
                showToast('Restore successful!', '#10b981');
            } catch(err) { showToast('Invalid file', '#ef4444'); }
        };
        reader.readAsText(file);
    }

    function showToast(msg, bg='#3b82f6') {
        const toast = document.getElementById('toastMsg');
        toast.style.backgroundColor = bg;
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }

    function exportCSV() {
        const sales = salesDB[currentDate] || [];
        const expenses = expensesDB[currentDate] || [];
        let csv = `Cafe Report ${currentDate}\n\nSALES\nTime,Item,Quantity,Amount\n`;
        sales.forEach(s => csv += `${s.time},${s.item},${s.quantity || 1},${s.amount}\n`);
        csv += `\nEXPENSES\nTime,Type,Note,Amount\n`;
        expenses.forEach(e => csv += `${e.time},${e.type},${e.notes || '-'},${e.amount}\n`);
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `cafe_${currentDate}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('CSV exported');
    }

    function printReport() {
        const win = window.open('', '_blank');
        const { income, expenseSum, profit } = getTotals(currentDate);
        win.document.write(`<html><head><title>Report ${currentDate}</title><style>body{font-family:sans-serif;padding:2rem;}</style></head><body><h1>CafeFlow Report</h1><h3>${currentDate}</h3><p>Income: ₦${income}<br>Expense: ₦${expenseSum}<br>Profit: ₦${profit}</p><hr><h3>Sales</h3><table border=1>${(salesDB[currentDate]||[]).map(s=>`<tr><td>${s.time}</td><td>${s.item}</td><td>${s.quantity}</td><td>₦${s.amount}</td></tr>`).join('')}</table><h3>Expenses</h3><table border=1>${(expensesDB[currentDate]||[]).map(e=>`<tr><td>${e.time}</td><td>${e.type}</td><td>${e.notes}</td><td>₦${e.amount}</td></tr>`).join('')}</table></body></html>`);
        win.print();
    }

    function clearAll() {
        if(confirm('💀 PERMANENT DELETE: all sales and expenses for all dates. Continue?')) {
            salesDB = {}; expensesDB = {};
            salesDB[currentDate] = []; expensesDB[currentDate] = [];
            persistAll();
            renderCurrentDay();
            updateWeeklyChart();
            showToast('All data erased', '#ef4444');
        }
    }

    // Event listeners & dark mode
    function initTheme() {
        const isDark = localStorage.getItem('theme') === 'dark';
        if(isDark) document.body.classList.add('dark');
        document.getElementById('themeToggleBtn').onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadAllData();
        renderServiceButtons();
        renderCurrentDay();
        updateWeeklyChart();
        initTheme();
        document.getElementById('globalDatePicker').value = currentDate;
        document.getElementById('globalDatePicker').addEventListener('change', (e) => {
            currentDate = e.target.value;
            if(!salesDB[currentDate]) salesDB[currentDate] = [];
            if(!expensesDB[currentDate]) expensesDB[currentDate] = [];
            renderCurrentDay();
        });
        // quantity
        document.getElementById('qtyPlus').onclick = () => { currentQty = Math.min(20, currentQty+1); document.getElementById('currentQty').innerText = currentQty; };
        document.getElementById('qtyMinus').onclick = () => { currentQty = Math.max(1, currentQty-1); document.getElementById('currentQty').innerText = currentQty; };
        document.getElementById('addCustomSaleBtn').onclick = () => {
            let amt = parseInt(document.getElementById('customAmount').value);
            let desc = document.getElementById('customDesc').value.trim();
            if(isNaN(amt) || amt<=0 || !desc) { showToast('Enter valid amount & description', '#ef4444'); return; }
            addSale(desc, amt, 1);
            document.getElementById('customAmount').value = ''; document.getElementById('customDesc').value = '';
        };
        document.getElementById('addExpenseBtn').onclick = () => {
            let amount = parseInt(document.getElementById('expenseAmount').value);
            if(isNaN(amount) || amount<=0) { showToast('Valid amount needed', '#ef4444'); return; }
            let type = document.getElementById('expenseTypeSelect').value;
            let note = document.getElementById('expenseNote').value;
            addExpense(type, amount, note);
            document.getElementById('expenseAmount').value = ''; document.getElementById('expenseNote').value = '';
        };
        document.getElementById('undoBtn').onclick = undoLast;
        document.getElementById('settingsBtn').onclick = openServiceModal;
        document.getElementById('saveServicesBtn').onclick = saveServicesFromModal;
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('serviceModal').style.display = 'none';
        document.getElementById('addServiceModalBtn').onclick = () => { dynamicServices.push({ name: "New Service", price: 100 }); openServiceModal(); };
        document.getElementById('exportCsvBtn').onclick = exportCSV;
        document.getElementById('printReportBtn').onclick = printReport;
        document.getElementById('backupJsonBtn').onclick = exportBackup;
        document.getElementById('restoreBtn').onclick = () => document.getElementById('restoreFileInput').click();
        document.getElementById('restoreFileInput').onchange = (e) => { if(e.target.files[0]) restoreBackup(e.target.files[0]); e.target.value = ''; };
        document.getElementById('clearAllBtn').onclick = clearAll;
        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                const pane = btn.dataset.tab === 'sales' ? 'salesPane' : 'expensesPane';
                document.getElementById('salesPane').classList.remove('active');
                document.getElementById('expensesPane').classList.remove('active');
                document.getElementById(pane).classList.add('active');
            };
        });
    });
</script>
</body>
</html>
