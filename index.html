<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cyber Cafe Pro | Sales & Expense Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0d6efd;
            --primary-dark: #0b5ed7;
            --success: #198754;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #0dcaf0;
            --dark: #212529;
            --light: #f8f9fa;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode .card {
            background: #2d2d3a;
            color: #e0e0e0;
        }

        body.dark-mode .table {
            color: #e0e0e0;
        }

        body.dark-mode .btn-outline-secondary {
            color: #e0e0e0;
            border-color: #6c757d;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .date-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.15);
            padding: 10px 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .date-controls label {
            color: white;
            font-weight: 500;
        }

        .date-controls input {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: var(--gray-600);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--gray-800);
        }

        .stat-card.profit .amount {
            color: var(--success);
        }

        .stat-card.loss .amount {
            color: var(--danger);
        }

        /* Action Buttons */
        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 20px;
            color: var(--gray-800);
            font-size: 1.5rem;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        /* Buttons Grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--dark);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gray-400);
            color: var(--gray-700);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Forms */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--gray-700);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .flex-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gray-200);
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        th {
            background: var(--gray-100);
            font-weight: 600;
            color: var(--gray-700);
        }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Actions Bar */
        .actions-bar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* Quantity Selector */
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--gray-100);
            padding: 8px 15px;
            border-radius: 10px;
        }

        .quantity-selector button {
            background: var(--gray-300);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .quantity-selector span {
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            .stat-card .amount {
                font-size: 1.8rem;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .flex-row {
                flex-direction: column;
            }
            
            .flex-row .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💰 Cyber Cafe Pro Dashboard</h1>
            <div style="display: flex; gap: 10px;">
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
                <div class="date-controls">
                    <label>📅 Date:</label>
                    <input type="date" id="selectedDate" onchange="changeDate()">
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>💰 Today's Income</h3>
                <div class="amount" id="totalIncome">₦0</div>
            </div>
            <div class="stat-card">
                <h3>💸 Today's Expenses</h3>
                <div class="amount" id="totalExpense">₦0</div>
            </div>
            <div class="stat-card profit" id="profitCard">
                <h3>📈 Net Profit</h3>
                <div class="amount" id="netProfit">₦0</div>
            </div>
        </div>

        <!-- Quick Sales -->
        <div class="card">
            <h2>🛒 Quick Sales</h2>
            <div class="button-grid" id="quickSalesButtons">
                <!-- Buttons will be populated here -->
            </div>
            <div class="flex-row">
                <div style="flex: 2;">
                    <div class="form-group">
                        <label>Custom Amount (₦)</label>
                        <input type="number" id="customAmount" placeholder="Enter amount" step="100">
                    </div>
                </div>
                <div style="flex: 2;">
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="customDesc" placeholder="e.g., CV Typing, USB Transfer">
                    </div>
                </div>
                <div style="flex: 1;">
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <button class="btn btn-primary" onclick="addCustomSale()" style="width: 100%;">➕ Add Sale</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Expenses -->
        <div class="card">
            <h2>📝 Add Expense</h2>
            <div class="flex-row">
                <div style="flex: 1;">
                    <div class="form-group">
                        <label>Expense Type</label>
                        <select id="expenseType">
                            <option value="Fuel">⛽ Fuel</option>
                            <option value="Data Subscription">📡 Data Subscription</option>
                            <option value="Staff Pay">👨‍💼 Staff Pay</option>
                            <option value="Generator Maintenance">🔧 Generator Maintenance</option>
                            <option value="Food/Tea">🍵 Food/Tea</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                </div>
                <div style="flex: 1;">
                    <div class="form-group">
                        <label>Amount (₦)</label>
                        <input type="number" id="expenseAmount" placeholder="Enter amount" step="100">
                    </div>
                </div>
                <div style="flex: 2;">
                    <div class="form-group">
                        <label>Notes (Optional)</label>
                        <input type="text" id="expenseNotes" placeholder="e.g., 20 litres">
                    </div>
                </div>
                <div style="flex: 0.5;">
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <button class="btn btn-danger" onclick="addExpense()" style="width: 100%;">➖ Add Expense</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transaction History -->
        <div class="card">
            <h2>📋 Transaction History</h2>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('sales')">Sales</div>
                <div class="tab" onclick="switchTab('expenses')">Expenses</div>
            </div>
            
            <div id="salesTab" class="tab-content active">
                <div class="table-container">
                    <table id="salesTable">
                        <thead>
                            <tr><th>Time</th><th>Item</th><th>Qty</th><th>Amount (₦)</th><th>Action</th></tr>
                        </thead>
                        <tbody id="salesList"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="expensesTab" class="tab-content">
                <div class="table-container">
                    <table id="expensesTable">
                        <thead>
                            <tr><th>Time</th><th>Type</th><th>Notes</th><th>Amount (₦)</th><th>Action</th></tr>
                        </thead>
                        <tbody id="expensesList"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="actions-bar">
                <button class="btn btn-outline" onclick="exportToCSV()">📎 Export to CSV</button>
                <button class="btn btn-outline" onclick="printReport()">🖨️ Print Report</button>
                <button class="btn btn-danger" onclick="clearAllData()">🗑️ Clear All Data</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Data structures
        let salesData = {};
        let expensesData = {};
        
        // Current date
        let currentDate = new Date().toISOString().split('T')[0];
        
        // Predefined services with prices
        const services = [
            { name: "🌐 Browsing 1hr", price: 200 },
            { name: "🖨️ Printing B&W", price: 50 },
            { name: "🎨 Printing Color", price: 150 },
            { name: "📄 Lamination", price: 300 },
            { name: "📸 Scanning", price: 100 }
        ];
        
        let currentQuantity = 1;
        
        // Load data from localStorage
        function loadData() {
            const savedSales = localStorage.getItem('cafe_sales');
            const savedExpenses = localStorage.getItem('cafe_expenses');
            
            if (savedSales) salesData = JSON.parse(savedSales);
            if (savedExpenses) expensesData = JSON.parse(savedExpenses);
            
            // Initialize today if not exists
            if (!salesData[currentDate]) salesData[currentDate] = [];
            if (!expensesData[currentDate]) expensesData[currentDate] = [];
            
            updateDashboard();
        }
        
        // Save data
        function saveData() {
            localStorage.setItem('cafe_sales', JSON.stringify(salesData));
            localStorage.setItem('cafe_expenses', JSON.stringify(expensesData));
        }
        
        // Add sale
        function addSale(item, price, quantity = 1) {
            const total = price * quantity;
            const sale = {
                id: Date.now(),
                time: new Date().toLocaleTimeString(),
                item: item,
                quantity: quantity,
                amount: total,
                type: 'sale'
            };
            
            if (!salesData[currentDate]) salesData[currentDate] = [];
            salesData[currentDate].push(sale);
            saveData();
            updateDashboard();
            showToast(`✅ Added: ${item} x${quantity} - ₦${total.toLocaleString()}`);
        }
        
        // Add custom sale
        function addCustomSale() {
            const amount = parseInt(document.getElementById('customAmount').value);
            const desc = document.getElementById('customDesc').value;
            
            if (isNaN(amount) || amount <= 0) {
                showToast('❌ Please enter a valid amount', 'error');
                return;
            }
            
            if (!desc.trim()) {
                showToast('❌ Please enter a description', 'error');
                return;
            }
            
            addSale(desc, amount, 1);
            document.getElementById('customAmount').value = '';
            document.getElementById('customDesc').value = '';
        }
        
        // Add expense
        function addExpense() {
            const type = document.getElementById('expenseType').value;
            const amount = parseInt(document.getElementById('expenseAmount').value);
            const notes = document.getElementById('expenseNotes').value;
            
            if (isNaN(amount) || amount <= 0) {
                showToast('❌ Please enter a valid amount', 'error');
                return;
            }
            
            const expense = {
                id: Date.now(),
                time: new Date().toLocaleTimeString(),
                type: type,
                notes: notes,
                amount: amount,
                type: 'expense'
            };
            
            if (!expensesData[currentDate]) expensesData[currentDate] = [];
            expensesData[currentDate].push(expense);
            saveData();
            updateDashboard();
            showToast(`➖ Added expense: ${type} - ₦${amount.toLocaleString()}`);
            
            document.getElementById('expenseAmount').value = '';
            document.getElementById('expenseNotes').value = '';
        }
        
        // Delete transaction
        function deleteTransaction(type, id) {
            if (type === 'sale') {
                salesData[currentDate] = salesData[currentDate].filter(s => s.id !== id);
            } else {
                expensesData[currentDate] = expensesData[currentDate].filter(e => e.id !== id);
            }
            saveData();
            updateDashboard();
            showToast('🗑️ Transaction deleted');
        }
        
        // Update dashboard
        function updateDashboard() {
            const sales = salesData[currentDate] || [];
            const expenses = expensesData[currentDate] || [];
            
            const totalIncome = sales.reduce((sum, sale) => sum + sale.amount, 0);
            const totalExpense = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            const netProfit = totalIncome - totalExpense;
            
            document.getElementById('totalIncome').innerHTML = `₦${totalIncome.toLocaleString()}`;
            document.getElementById('totalExpense').innerHTML = `₦${totalExpense.toLocaleString()}`;
            document.getElementById('netProfit').innerHTML = `₦${netProfit.toLocaleString()}`;
            
            const profitCard = document.getElementById('profitCard');
            if (netProfit >= 0) {
                profitCard.classList.add('profit');
                profitCard.classList.remove('loss');
            } else {
                profitCard.classList.add('loss');
                profitCard.classList.remove('profit');
            }
            
            updateSalesTable(sales);
            updateExpensesTable(expenses);
        }
        
        // Update sales table
        function updateSalesTable(sales) {
            const tbody = document.getElementById('salesList');
            if (sales.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No sales today</td></tr>';
                return;
            }
            
            tbody.innerHTML = sales.map(sale => `
                <tr>
                    <td>${sale.time}</td>
                    <td>${sale.item}</td>
                    <td>${sale.quantity || 1}</td>
                    <td>₦${sale.amount.toLocaleString()}</td>
                    <td><button class="delete-btn" onclick="deleteTransaction('sale', ${sale.id})">Delete</button></td>
                </tr>
            `).join('');
        }
        
        // Update expenses table
        function updateExpensesTable(expenses) {
            const tbody = document.getElementById('expensesList');
            if (expenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No expenses today</td></tr>';
                return;
            }
            
            tbody.innerHTML = expenses.map(exp => `
                <tr>
                    <td>${exp.time}</td>
                    <td>${exp.type}</td>
                    <td>${exp.notes || '-'}</td>
                    <td>₦${exp.amount.toLocaleString()}</td>
                    <td><button class="delete-btn" onclick="deleteTransaction('expense', ${exp.id})">Delete</button></td>
                </tr>
            `).join('');
        }
        
        // Change date
        function changeDate() {
            currentDate = document.getElementById('selectedDate').value;
            if (!salesData[currentDate]) salesData[currentDate] = [];
            if (!expensesData[currentDate]) expensesData[currentDate] = [];
            updateDashboard();
            showToast(`📅 Switched to ${currentDate}`);
        }
        
        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            
            if (tab === 'sales') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('salesTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('expensesTab').classList.add('active');
            }
        }
        
        // Export to CSV
        function exportToCSV() {
            const sales = salesData[currentDate] || [];
            const expenses = expensesData[currentDate] || [];
            
            let csv = "CAFE REPORT - " + currentDate + "\n\n";
            csv += "SALES\n";
            csv += "Time,Item,Quantity,Amount(₦)\n";
            sales.forEach(s => {
                csv += `${s.time},${s.item},${s.quantity || 1},${s.amount}\n`;
            });
            
            csv += "\nEXPENSES\n";
            csv += "Time,Type,Notes,Amount(₦)\n";
            expenses.forEach(e => {
                csv += `${e.time},${e.type},${e.notes || '-'},${e.amount}\n`;
            });
            
            const totalIncome = sales.reduce((sum, s) => sum + s.amount, 0);
            const totalExpense = expenses.reduce((sum, e) => sum + e.amount, 0);
            csv += `\n\nSUMMARY\nTotal Income: ${totalIncome}\nTotal Expenses: ${totalExpense}\nNet Profit: ${totalIncome - totalExpense}`;
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cafe_report_${currentDate}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📎 Report exported successfully');
        }
        
        // Print report
        function printReport() {
            const sales = salesData[currentDate] || [];
            const expenses = expensesData[currentDate] || [];
            const totalIncome = sales.reduce((sum, s) => sum + s.amount, 0);
            const totalExpense = expenses.reduce((sum, e) => sum + e.amount, 0);
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Cafe Report - ${currentDate}</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        h1 { color: #0d6efd; }
                        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                        th { background: #f2f2f2; }
                        .summary { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; }
                        .profit { color: green; font-weight: bold; }
                        .loss { color: red; font-weight: bold; }
                    </style>
                </head>
                <body>
                    <h1>Cyber Cafe Daily Report</h1>
                    <h3>Date: ${currentDate}</h3>
                    
                    <h2>Sales</h2>
                    <table>
                        <tr><th>Time</th><th>Item</th><th>Quantity</th><th>Amount (₦)</th></tr>
                        ${sales.map(s => `<tr><td>${s.time}</td><td>${s.item}</td><td>${s.quantity || 1}</td><td>${s.amount}</td></tr>`).join('')}
                    </table>
                    
                    <h2>Expenses</h2>
                    <table>
                        <tr><th>Time</th><th>Type</th><th>Notes</th><th>Amount (₦)</th></tr>
                        ${expenses.map(e => `<tr><td>${e.time}</td><td>${e.type}</td><td>${e.notes || '-'}</td><td>${e.amount}</td></tr>`).join('')}
                    </table>
                    
                    <div class="summary">
                        <h3>Summary</h3>
                        <p>Total Income: ₦${totalIncome.toLocaleString()}</p>
                        <p>Total Expenses: ₦${totalExpense.toLocaleString()}</p>
                        <p>Net Profit: <span class="${totalIncome - totalExpense >= 0 ? 'profit' : 'loss'}">₦${(totalIncome - totalExpense).toLocaleString()}</span></p>
                    </div>
                    
                    <p><em>Generated on ${new Date().toLocaleString()}</em></p>
                </body>
                </html>
            `);
            printWindow.print();
            printWindow.close();
            showToast('🖨️ Print window opened');
        }
        
        // Clear all data
        function clearAllData() {
            if (confirm('WARNING: This will delete ALL data for ALL dates. This cannot be undone. Continue?')) {
                salesData = {};
                expensesData = {};
                localStorage.removeItem('cafe_sales');
                localStorage.removeItem('cafe_expenses');
                
                currentDate = new Date().toISOString().split('T')[0];
                salesData[currentDate] = [];
                expensesData[currentDate] = [];
                saveData();
                updateDashboard();
                showToast('🗑️ All data cleared successfully');
            }
        }
        
        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // Toggle dark mode
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            showToast('🌓 Theme toggled');
        }
        
        // Initialize quick sale buttons
        function initQuickSalesButtons() {
            const container = document.getElementById('quickSalesButtons');
            
            // Add quantity selector
            const quantityDiv = document.createElement('div');
            quantityDiv.className = 'quantity-selector';
            quantityDiv.innerHTML = `
                <span>Qty:</span>
                <button onclick="changeQuantity(-1)">-</button>
                <span id="quantityDisplay">1</span>
                <button onclick="changeQuantity(1)">+</button>
            `;
            container.appendChild(quantityDiv);
            
            // Add service buttons
            services.forEach(service => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-primary';
                btn.innerHTML = `${service.name}<br><small>₦${service.price.toLocaleString()}</small>`;
                btn.onclick = () => addSale(service.name, service.price, currentQuantity);
                container.appendChild(btn);
            });
        }
        
        function changeQuantity(delta) {
            currentQuantity += delta;
            if (currentQuantity < 1) currentQuantity = 1;
            if (currentQuantity > 20) currentQuantity = 20;
            document.getElementById('quantityDisplay').textContent = currentQuantity;
        }
        
        // Set today's date in date picker
        document.getElementById('selectedDate').value = currentDate;
        
        // Initialize everything
        initQuickSalesButtons();
        loadData();
    </script>
</body>
</html>
